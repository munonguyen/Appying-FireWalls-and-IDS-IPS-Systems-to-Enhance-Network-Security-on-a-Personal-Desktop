# Snort Custom Rules for Brute-Force and Reconnaissance Attacks
# Purpose: Detect SSH/RDP brute-force attacks and port scanning
# Usage: Include in snort.conf or run with: snort -c custom_rules.conf

# ============================================================================
# SSH BRUTE-FORCE DETECTION RULES
# ============================================================================

# Rule 1: Detect SSH connection attempts
alert tcp any any -> any 22 (
  msg:"SSH Connection Attempt"; 
  flow:to_server,new; 
  flags:S; 
  content:"|53 53 48|"; 
  offset:0; depth:3; 
  classtype:network-application; 
  sid:3000001; rev:1; priority:3;
)

# Rule 2: SSH multiple failed authentication attempts (Brute-Force)
alert tcp any any -> any 22 (
  msg:"SSH BRUTE-FORCE Possible Brute Force Attack Detected"; 
  flow:to_server,established; 
  content:"Invalid user"; 
  threshold: type both, track by_src, count 5, seconds 60; 
  classtype:attempted-user; 
  sid:3000002; rev:1; priority:1;
)

# Rule 3: SSH failed login pattern
alert tcp any any -> any 22 (
  msg:"SSH Failed Login Attempt"; 
  flow:to_server,established; 
  content:"Password"; msg:"SSH password attempt"; 
  threshold: type both, track by_src, count 3, seconds 30; 
  classtype:attempted-admin; 
  sid:3000003; rev:1; priority:2;
)

# Rule 4: SSH rapid connection attempts from single source (faster brute-force)
alert tcp any any -> any 22 (
  msg:"SSH RAPID Multiple Connections from Same Source"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 10, seconds 60; 
  classtype:suspicious-login; 
  sid:3000004; rev:1; priority:1;
)

# ============================================================================
# RDP BRUTE-FORCE DETECTION RULES
# ============================================================================

# Rule 5: RDP connection attempts
alert tcp any any -> any 3389 (
  msg:"RDP Connection Attempt"; 
  flow:to_server,new; 
  flags:S; 
  classtype:network-application; 
  sid:3000005; rev:1; priority:3;
)

# Rule 6: RDP multiple connection attempts (Brute-Force)
alert tcp any any -> any 3389 (
  msg:"RDP BRUTE-FORCE Multiple Connections Detected"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 10, seconds 60; 
  classtype:suspicious-login; 
  sid:3000006; rev:1; priority:1;
)

# Rule 7: RDP rapid reconnection attempts
alert tcp any any -> any 3389 (
  msg:"RDP BRUTE-FORCE Rapid Connection Attempts"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 20, seconds 30; 
  classtype:attempted-admin; 
  sid:3000007; rev:1; priority:1;
)

# ============================================================================
# PORT SCANNING / RECONNAISSANCE DETECTION RULES
# ============================================================================

# Rule 8: Nmap SYN scan (TCP SYN flag scan)
alert tcp any any -> any any (
  msg:"RECONNAISSANCE Possible Nmap SYN Scan"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 20, seconds 60; 
  classtype:attempted-recon; 
  sid:3000008; rev:1; priority:2;
)

# Rule 9: Null flag scan detection (Nmap technique)
alert tcp any any -> any any (
  msg:"RECONNAISSANCE Null Flag Scan Detected"; 
  flow:to_server; 
  flags:0; 
  classtype:attempted-recon; 
  sid:3000009; rev:1; priority:1;
)

# Rule 10: Xmas flag scan (FPU flags)
alert tcp any any -> any any (
  msg:"RECONNAISSANCE Xmas Flag Scan Detected"; 
  flow:to_server; 
  flags:FPU; 
  classtype:attempted-recon; 
  sid:3000010; rev:1; priority:1;
)

# Rule 11: FIN flag scan
alert tcp any any -> any any (
  msg:"RECONNAISSANCE FIN Flag Scan Detected"; 
  flow:to_server; 
  flags:F; 
  classtype:attempted-recon; 
  sid:3000011; rev:1; priority:1;
)

# Rule 12: Rapid port probing (multiple different ports in short time)
alert tcp any any -> any any (
  msg:"RECONNAISSANCE Port Scanning Activity Detected"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 30, seconds 30; 
  classtype:attempted-recon; 
  sid:3000012; rev:1; priority:2;
)

# Rule 13: Sequential port scan pattern
alert tcp any any -> any [20:1024] (
  msg:"RECONNAISSANCE Sequential Port Scan Pattern"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 25, seconds 60; 
  classtype:attempted-recon; 
  sid:3000013; rev:1; priority:2;
)

# ============================================================================
# COMBINED / GENERAL ATTACK DETECTION
# ============================================================================

# Rule 14: High rate of connections from single source (DDoS or mass attack)
alert tcp any any -> any any (
  msg:"ATTACK High Connection Rate from Single Source"; 
  flow:to_server,new; 
  flags:S; 
  threshold: type both, track by_src, count 100, seconds 60; 
  classtype:suspicious-activity; 
  sid:3000014; rev:1; priority:1;
)

# Rule 15: Connection attempt with no data transfer (hung connection)
alert tcp any any -> any any (
  msg:"SUSPICIOUS Idle Connection No Data Transfer"; 
  flow:to_server,established; 
  threshold: type both, track by_flow, count 1, seconds 300; 
  classtype:suspicious-activity; 
  sid:3000015; rev:1; priority:3;
)

# ============================================================================
# ALERTING OPTIONS
# ============================================================================
# Configuration notes:
# - Use "alert" to generate alerts visible in logs
# - Use "drop" instead of "alert" to BLOCK packets in IPS mode
# - Example for IPS: drop tcp any any -> any 22 ...
# - Change "rev:1" to "rev:2" when updating rules
# - sid (signature ID) should be unique for each rule
# - priority: 1=High, 2=Medium, 3=Low

# ============================================================================
# EXAMPLE: Converting to IPS mode
# ============================================================================
# To enable packet BLOCKING (IPS mode), change rules like this:
#
# FROM:  alert tcp any any -> any 22 (msg:"SSH Attack"; ...)
# TO:    drop tcp any any -> any 22 (msg:"SSH Attack"; ...)
#
# Then restart Snort with inline/IPS mode enabled
